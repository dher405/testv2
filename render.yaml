previewsEnabled: false

services:
  - type: web
    name: testv2-backend
    runtime: node
    nodeVersion: 20
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    autoDeploy: false
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        fromService:
          name: testv2-frontend
          type: web
          property: host

  - type: static
    name: testv2-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: false
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: testv2-backend
          type: web
          property: host
